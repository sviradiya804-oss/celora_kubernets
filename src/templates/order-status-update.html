<!DOCTYPE html>
<html style="margin:0;padding:0;">
<head>
  <meta charset="UTF-8">
  <title>Order Status Updated</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f6f6;font-family:Arial,sans-serif;">

  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;margin:auto;">
    <tr>
      <td align="center" bgcolor="#007BFF" style="padding:40px 20px;">
        <h1 style="color:white;font-size:24px;margin:0;">Celora Jewelry</h1>
        <p style="color:#e0e0e0;font-size:16px;margin-top:8px;">Order Status Updated</p>
      </td>
    </tr>

    <tr>
      <td bgcolor="#ffffff" style="padding:40px 30px;">
        <h2 style="color:#333;font-size:20px;margin-bottom:20px;">Hello {{name}},</h2>

        <p style="color:#555;font-size:16px;line-height:1.5;">
          The status of your order <strong>#{{orderId}}</strong> has been updated to:
        </p>

        <p style="margin-top:10px;font-size:20px;color:#007BFF;"><strong>{{status}}</strong></p>

        <p style="margin-top:20px;color:#555;font-size:16px;">
          Thank you for shopping with us!
        </p>

        <p style="margin-top:30px;font-size:14px;color:#777;">
          If you have any questions, feel free to contact us at <a href="mailto:support@yourcompany.com" style="color:#007BFF;text-decoration:underline;">support@yourcompany.com</a>.
        </p>
      </td>
    </tr>

    <tr>
      <td bgcolor="#f8f8f8" style="padding:20px 30px;text-align:center;font-size:12px;color:#999;">
        &copy; {{year}} Celora Jewelry. All rights reserved.
      </td>
    </tr>
  </table>

</body>
</html>
